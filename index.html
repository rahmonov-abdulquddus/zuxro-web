<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuxro Farm Katalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f7; padding: 10px; margin: 0; }
        .search-box { position: sticky; top: 0; background: white; padding: 10px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 0 0 15px 15px; }
        input { width: 100%; padding: 12px; border: 2px solid #27ae60; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        #list { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 12px; border-radius: 15px; border: 1px solid #eee; display: flex; flex-direction: column; min-height: 110px; }
        .name { font-weight: bold; color: #2c3e50; font-size: 12px; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { color: #27ae60; font-weight: 800; font-size: 14px; margin: 5px 0; }
        .info { font-size: 10px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="search-box"><input type="text" id="search" placeholder="Dori qidirish..." oninput="render()"></div>
    <div id="list"></div>

<script>
    let products = [];

    // Ma'lumotlarni yuklash
    fetch('data.json?v=' + Date.now())
        .then(res => res.json())
        .then(data => {
            products = data;
            render();
        })
        .catch(err => {
            console.error(err);
            document.getElementById('list').innerHTML = "Yuklashda xato!";
        });

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = products.filter(p => p.Nomi && p.Nomi.toLowerCase().includes(query));
        
        const html = filtered.map(p => `
            <div class="card">
                <div class="name">${p.Nomi}</div>
                <div class="price">${Number(p.Sotish_narxi).toLocaleString('ru-RU')} so'm</div>
                <div class="info">📦 ${p.Pachka} pachka, ${p.Dona} dona</div>
                <div class="info">⏳ ${p.Srok || '-'}</div>
            </div>
        `).join('');
        
        document.getElementById('list').innerHTML = html || '<div style="grid-column: 1/3; text-align: center;">Topilmadi.</div>';
    }
</script>
</body>
</html>
