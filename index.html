<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuxro Farm Katalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f7; padding: 10px; margin: 0; }
        .search-box { position: sticky; top: 0; background: white; padding: 10px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 0 0 15px 15px; }
        input { width: 100%; padding: 12px; border: 1.5px solid #27ae60; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        #list { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 12px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; }
        .name { font-weight: bold; color: #2c3e50; font-size: 13px; margin-bottom: 5px; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .price { color: #27ae60; font-weight: 800; font-size: 15px; margin: 5px 0; }
        .info { font-size: 11px; color: #95a5a6; }
        .error-msg { text-align: center; color: #e74c3c; margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="search" placeholder="Dori qidirish..." oninput="render()">
    </div>
    <div id="list"></div>

<script>
    let products = [];
    // Cache-dan qochish uchun data.json?v=vaqt qo'shamiz
    fetch('data.json?v=' + new Date().getTime())
        .then(res => {
            if (!res.ok) throw new Error("Ma'lumot topilmadi");
            return res.json();
        })
        .then(data => {
            products = data;
            render();
        })
        .catch(err => {
            document.getElementById('list').innerHTML = `<div class="error-msg">⚠️ Xatolik: Ma'lumotlarni yuklab bo'lmadi.<br>${err.message}</div>`;
        });

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = products.filter(p => p.Nomi.toLowerCase().includes(query));
        
        const html = filtered.map(p => `
            <div class="card">
                <div class="name">${p.Nomi}</div>
                <div>
                    <div class="price">${p.Sotish_narxi.toLocaleString()} so'm</div>
                    <div class="info">📦 ${p.Pachka}p, ${p.Dona}d</div>
                    <div class="info">⏳ ${p.Srok}</div>
                </div>
            </div>
        `).join('');
        
        document.getElementById('list').innerHTML = html || '<div style="grid-column: 1/3; text-align: center; color: #95a5a6; padding: 20px;">Hech narsa topilmadi 😕</div>';
    }
</script>
</body>
</html>
